openapi: 3.0.3

info:
  title: Product Lifecycle Tracker API
  version: 1.0.0
  description: >
    REST API for tracking the lifecycle of software products across the
    Ideation, Definition and Development phases. Single-user; all `/api`
    endpoints require a Firebase ID token.
  license:
    name: MIT

servers:
  - url: https://backend-production-898a.up.railway.app
    description: Railway (production)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: health
    description: Service liveness
  - name: products
    description: Product management
  - name: features
    description: Feature backlog (RICE / MoSCoW)
  - name: sprints
    description: Sprints
  - name: tasks
    description: Sprint tasks
  - name: kpis
    description: KPIs and their history
  - name: growth
    description: Growth-hacking canvas (notes) and RICE-scored experiments, per product

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [health]
      summary: Liveness/readiness probe
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Database unreachable

  /api/products:
    get:
      tags: [products]
      summary: List products
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated products with child counts
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedProducts' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [products]
      summary: Create a product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/products/{id}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [products]
      summary: Get a product
      operationId: getProduct
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductWithCounts' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [products]
      summary: Update a product
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [products]
      summary: Delete a product (cascades to children)
      operationId: deleteProduct
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/features:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [features]
      summary: List features for a product
      operationId: listFeatures
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated features
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedFeatures' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [features]
      summary: Create a feature
      operationId: createFeature
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Feature' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/features/{fid}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/FeatureId'
    put:
      tags: [features]
      summary: Update a feature
      operationId: updateFeature
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FeatureInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Feature' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [features]
      summary: Delete a feature
      operationId: deleteFeature
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/sprints:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [sprints]
      summary: List sprints for a product
      operationId: listSprints
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated sprints
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedSprints' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [sprints]
      summary: Create a sprint
      operationId: createSprint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SprintInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sprint' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/sprints/{sid}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/SprintId'
    put:
      tags: [sprints]
      summary: Update a sprint
      operationId: updateSprint
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SprintInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sprint' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/sprints/{sid}/tasks:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/SprintId'
    get:
      tags: [tasks]
      summary: List tasks in a sprint
      operationId: listTasks
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated tasks
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedTasks' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [tasks]
      summary: Create a task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/sprints/{sid}/tasks/{tid}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/SprintId'
      - $ref: '#/components/parameters/TaskId'
    put:
      tags: [tasks]
      summary: Update a task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TaskInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Task' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [tasks]
      summary: Delete a task
      operationId: deleteTask
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/kpis:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [kpis]
      summary: List KPIs (with history) for a product
      operationId: listKpis
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated KPIs
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedKpis' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [kpis]
      summary: Create a KPI
      operationId: createKpi
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KpiInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Kpi' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/kpis/{kid}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/KpiId'
    put:
      tags: [kpis]
      summary: Update a KPI
      operationId: updateKpi
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KpiInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Kpi' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/kpis/{kid}/values:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/KpiId'
    get:
      tags: [kpis]
      summary: KPI value history (sparkline)
      operationId: listKpiValues
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated KPI values (oldest first)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedKpiValues' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [kpis]
      summary: Log a new KPI data point
      operationId: createKpiValue
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KpiValueInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KpiValue' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Growth: canvas full view --------------------------------------------
  /api/products/{id}/growth/canvas:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [growth]
      summary: Full growth canvas (section → field → notes)
      operationId: getGrowthCanvas
      responses:
        '200':
          description: Canvas grouped by section and field (all sections present)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthCanvas' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Growth: canvas notes ------------------------------------------------
  /api/products/{id}/growth/notes:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [growth]
      summary: List growth notes (filterable by section/field)
      operationId: listGrowthNotes
      parameters:
        - $ref: '#/components/parameters/SectionQuery'
        - $ref: '#/components/parameters/FieldQuery'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated growth notes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedGrowthNotes' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [growth]
      summary: Create a growth note
      description: '`field` must belong to the chosen `section` (see GrowthSection field sets).'
      operationId: createGrowthNote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrowthNoteCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthNote' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/growth/notes/{noteId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/NoteId'
    get:
      tags: [growth]
      summary: Get a growth note
      operationId: getGrowthNote
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthNote' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [growth]
      summary: Update a growth note (content/order)
      operationId: patchGrowthNote
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrowthNotePatch' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthNote' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [growth]
      summary: Delete a growth note
      operationId: deleteGrowthNote
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---- Growth: experiments (high-tempo testing, RICE) ----------------------
  /api/products/{id}/growth/experiments:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [growth]
      summary: List growth experiments (filterable by status)
      operationId: listGrowthExperiments
      parameters:
        - $ref: '#/components/parameters/ExperimentStatusQuery'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Paginated experiments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaginatedGrowthExperiments' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [growth]
      summary: Create a growth experiment
      operationId: createGrowthExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrowthExperimentCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthExperiment' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/products/{id}/growth/experiments/{experimentId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/ExperimentId'
    get:
      tags: [growth]
      summary: Get a growth experiment
      operationId: getGrowthExperiment
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthExperiment' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [growth]
      summary: Update a growth experiment
      operationId: patchGrowthExperiment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GrowthExperimentPatch' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GrowthExperiment' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [growth]
      summary: Delete a growth experiment
      operationId: deleteGrowthExperiment
      responses:
        '204': { description: Deleted }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        A Firebase ID token. Obtain it client-side after Firebase sign-in and
        send it as `Authorization: Bearer <idToken>`.

  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    FeatureId:
      name: fid
      in: path
      required: true
      schema: { type: string, format: uuid }
    SprintId:
      name: sid
      in: path
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      name: tid
      in: path
      required: true
      schema: { type: string, format: uuid }
    KpiId:
      name: kid
      in: path
      required: true
      schema: { type: string, format: uuid }
    PageParam:
      name: page
      in: query
      required: false
      description: 1-based page number
      schema: { type: integer, minimum: 1, default: 1 }
    PageSizeParam:
      name: pageSize
      in: query
      required: false
      description: Items per page
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    NoteId:
      name: noteId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ExperimentId:
      name: experimentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SectionQuery:
      name: section
      in: query
      required: false
      description: Filter notes by canvas section
      schema: { $ref: '#/components/schemas/GrowthSection' }
    FieldQuery:
      name: field
      in: query
      required: false
      description: Filter notes by field within the section
      schema: { type: string }
    ExperimentStatusQuery:
      name: status
      in: query
      required: false
      description: Filter experiments by status
      schema: { $ref: '#/components/schemas/ExperimentStatus' }

  responses:
    Unauthorized:
      description: Missing or invalid Firebase token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Health:
      type: object
      properties:
        status: { type: string, example: ok }
        database: { type: string, example: up }
        timestamp: { type: string, format: date-time }

    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: NOT_FOUND }
        message: { type: string }
        details:
          type: array
          items:
            type: object
            properties:
              field: { type: string }
              message: { type: string }

    Timestamps:
      type: object
      properties:
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    PaginationMeta:
      type: object
      required: [total, page, pageSize, totalPages]
      properties:
        total: { type: integer, example: 42 }
        page: { type: integer, example: 1 }
        pageSize: { type: integer, example: 20 }
        totalPages: { type: integer, example: 3 }

    ProductStatus:
      type: string
      enum: [ideation, definition, development]

    ProductInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ProductStatus' }

    Product:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - type: object
          properties:
            id: { type: string, format: uuid }
            userId: { type: string, format: uuid, readOnly: true }
            name: { type: string }
            description: { type: string, nullable: true }
            status: { $ref: '#/components/schemas/ProductStatus' }

    ProductWithCounts:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            _count:
              type: object
              properties:
                features: { type: integer }
                sprints: { type: integer }
                kpis: { type: integer }

    FeatureInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        phase:
          type: string
          enum: [ideation, definition, development]
        priorityMethod:
          type: string
          enum: [rice, moscow]
        riceReach: { type: number, nullable: true }
        riceImpact: { type: number, nullable: true }
        riceConfidence: { type: number, nullable: true, minimum: 0, maximum: 1 }
        riceEffort: { type: number, nullable: true }
        moscowCategory:
          type: string
          nullable: true
          enum: [must, should, could, wont]
        status:
          type: string
          enum: [idea, backlog, in_progress, done, rejected]

    Feature:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - $ref: '#/components/schemas/FeatureInput'
        - type: object
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }

    SprintInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 200 }
        goal: { type: string, nullable: true }
        startDate: { type: string, format: date-time, nullable: true }
        endDate: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [planned, active, completed]

    Sprint:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - $ref: '#/components/schemas/SprintInput'
        - type: object
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }

    TaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        status:
          type: string
          enum: [todo, in_progress, done]
        estimatedHours: { type: number, nullable: true }
        actualHours: { type: number, nullable: true }
        featureId: { type: string, format: uuid, nullable: true }

    Task:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - $ref: '#/components/schemas/TaskInput'
        - type: object
          properties:
            id: { type: string, format: uuid }
            sprintId: { type: string, format: uuid }

    KpiInput:
      type: object
      required: [name, unit]
      properties:
        name: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        unit: { type: string, example: users }
        targetValue: { type: number, nullable: true }
        currentValue: { type: number, nullable: true }

    Kpi:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - $ref: '#/components/schemas/KpiInput'
        - type: object
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }

    KpiWithValues:
      allOf:
        - $ref: '#/components/schemas/Kpi'
        - type: object
          properties:
            values:
              type: array
              items: { $ref: '#/components/schemas/KpiValue' }

    KpiValueInput:
      type: object
      required: [value]
      properties:
        value: { type: number }
        recordedAt: { type: string, format: date-time }

    KpiValue:
      type: object
      properties:
        id: { type: string, format: uuid }
        kpiId: { type: string, format: uuid }
        value: { type: number }
        recordedAt: { type: string, format: date-time }

    # --- Paginated list envelopes ({ data, meta }) -------------------------
    PaginatedProducts:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ProductWithCounts' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    PaginatedFeatures:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Feature' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    PaginatedSprints:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Sprint' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    PaginatedTasks:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Task' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    PaginatedKpis:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/KpiWithValues' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    PaginatedKpiValues:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/KpiValue' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    # --- Growth: canvas notes ---------------------------------------------
    GrowthSection:
      type: string
      description: |
        Growth canvas section. Allowed `field` values per section:
        - project_overview: unique_value_proposition, secret_sauce, core_value, target_customers, why
        - metrics: formula, north_star_metric
        - retention: short_term, medium_term, long_term
        - acquisition: language_market_fit, channel_product_fit
        - toolbox: data_mining, social_tracking, ads_tracking, surveys, other
        - high_tempo_testing: framework, frequency
        - customer_loops: payload, conversion_rate, frequency
      enum:
        - project_overview
        - metrics
        - retention
        - acquisition
        - toolbox
        - high_tempo_testing
        - customer_loops

    GrowthNoteCreate:
      type: object
      required: [section, field, content]
      properties:
        section: { $ref: '#/components/schemas/GrowthSection' }
        field: { type: string, example: north_star_metric }
        content: { type: string, minLength: 1 }
        order: { type: integer, minimum: 0, default: 0 }

    GrowthNotePatch:
      type: object
      description: At least one of content/order.
      properties:
        content: { type: string, minLength: 1 }
        order: { type: integer, minimum: 0 }

    GrowthNote:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - type: object
          required: [id, productId, section, field, content, order]
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }
            section: { $ref: '#/components/schemas/GrowthSection' }
            field: { type: string }
            content: { type: string }
            order: { type: integer }

    FieldNotes:
      type: object
      description: Map of field name → ordered list of notes
      additionalProperties:
        type: array
        items: { $ref: '#/components/schemas/GrowthNote' }

    GrowthCanvas:
      type: object
      description: Full canvas grouped by section → field → notes (all sections present)
      required:
        - project_overview
        - metrics
        - retention
        - acquisition
        - toolbox
        - high_tempo_testing
        - customer_loops
      properties:
        project_overview: { $ref: '#/components/schemas/FieldNotes' }
        metrics: { $ref: '#/components/schemas/FieldNotes' }
        retention: { $ref: '#/components/schemas/FieldNotes' }
        acquisition: { $ref: '#/components/schemas/FieldNotes' }
        toolbox: { $ref: '#/components/schemas/FieldNotes' }
        high_tempo_testing: { $ref: '#/components/schemas/FieldNotes' }
        customer_loops: { $ref: '#/components/schemas/FieldNotes' }

    PaginatedGrowthNotes:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/GrowthNote' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    # --- Growth: experiments (high-tempo testing, RICE) -------------------
    ExperimentStatus:
      type: string
      enum: [backlog, running, done]

    ExperimentOutcome:
      type: string
      enum: [validated, invalidated, inconclusive]

    GrowthExperimentInput:
      type: object
      properties:
        hypothesis: { type: string, nullable: true }
        section: { $ref: '#/components/schemas/GrowthSection' }
        metric: { type: string, nullable: true, example: activation_rate }
        riceReach: { type: number, nullable: true }
        riceImpact: { type: number, nullable: true }
        riceConfidence: { type: number, nullable: true, minimum: 0, maximum: 1 }
        riceEffort: { type: number, nullable: true }
        status: { $ref: '#/components/schemas/ExperimentStatus' }
        outcome: { $ref: '#/components/schemas/ExperimentOutcome' }
        learning: { type: string, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        endedAt: { type: string, format: date-time, nullable: true }

    GrowthExperimentCreate:
      allOf:
        - type: object
          required: [title]
          properties:
            title: { type: string, minLength: 1, maxLength: 200 }
        - $ref: '#/components/schemas/GrowthExperimentInput'

    GrowthExperimentPatch:
      allOf:
        - type: object
          properties:
            title: { type: string, minLength: 1, maxLength: 200 }
        - $ref: '#/components/schemas/GrowthExperimentInput'

    GrowthExperiment:
      allOf:
        - $ref: '#/components/schemas/Timestamps'
        - type: object
          required: [id, productId, title, status]
          properties:
            id: { type: string, format: uuid }
            productId: { type: string, format: uuid }
            title: { type: string }
        - $ref: '#/components/schemas/GrowthExperimentInput'

    PaginatedGrowthExperiments:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/GrowthExperiment' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }
